<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Investimentos</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="h-[100dvh] grid grid-cols-3 grid-rows-2">
    <aside
      class="bg-emerald-300 row-span-2 flex flex-col justify-between py-5 px-2"
    >
      <h1 class="text-2xl font-bold px-6 py-2">Calculadora de Investimentos</h1>
      <form class="w-full">
        <div class="flex w-full flex-col">
          <label for="return-rate">Rentabilidade</label>
          <div class="flex">
            <input value="%" class="w-1/6" type="type" disabled />
            <input type="text" class="w-1/2" id="return-rate" />
            <select class="w-1/3" id="evaluation-period">
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
        </div>
      </form>
      <div>
        <button>Calcular</button>
        <button>Limpar</button>
      </div>
    </aside>
    <main>
      <p>Resultados</p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
